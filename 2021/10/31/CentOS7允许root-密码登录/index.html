    <h1 class="posttitle" itemprop="name headline">
        CentOS7允许root/开启密码登录
    </h1>



    <div class="meta">
      <span class="author" itemprop="author" itemscope itemtype="http://schema.org/Person">
        <span itemprop="name">ainexur</span>
      </span>
      
    <div class="postdate">
      
        <time datetime="2021-10-30T17:39:29.000Z" itemprop="datePublished">2021-10-31</time>
        
      
    </div>


      

      
    <div class="article-tag">
        <i class="fas fa-tag"></i>
        <a class="tag-link-link" href="/tags/CentOS/" rel="tag">CentOS</a>
    </div>


    </div>
  </header>
  

  <div class="content" itemprop="articleBody">
    <p>1、 修改sshd配置</p>
<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">vim /etc/ssh/sshd\_config</span><br></pre></td></tr></table></figure>

<p>将如下两项改为yes， 如果是注释#状态就取消注释</p>
<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">PasswordAuthentication yes	#允许使用密码登录</span><br><span class="line">PermitRootLogin yes	#允许root认证登录</span><br></pre></td></tr></table></figure>

<p>2、重启sshd</p>
<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">systemctl restart sshd</span><br></pre></td></tr></table></figure>

<p>3、设置免密登录(可选)</p>
<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">ssh\-kengen ssh\-copy-id -i .ssh/id\_rsa.pub  root@172.0.0.3</span><br></pre></td></tr></table></figure>


  </div>
</article>
