        Docker安装青龙面板
    </h1>



    <div class="meta">
      <span class="author" itemprop="author" itemscope itemtype="http://schema.org/Person">
        <span itemprop="name">ainexur</span>
      </span>
      
    <div class="postdate">
      
        <time datetime="2021-10-30T18:13:08.000Z" itemprop="datePublished">2021-10-31</time>
        
      
    </div>

  <div class="content" itemprop="articleBody">
    <h2 id="1-前提条件"><a href="#1-前提条件" class="headerlink" title="1. 前提条件"></a>1. 前提条件</h2><p>安装了docker</p>
<h2 id="2-青龙面板安装"><a href="#2-青龙面板安装" class="headerlink" title="2.青龙面板安装"></a>2.青龙面板安装</h2><ul>
<li>  拉取青龙的镜像文件（官方）</li>
</ul>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">docker pull whyour/qinglong:latest</span><br></pre></td></tr></table></figure>

<ul>
<li>  创建容器</li>
</ul>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line">docker run -dit \</span><br><span class="line">-v $pwd/ql/config:/ql/config \</span><br><span class="line">-v $pwd/ql/log:/ql/log \</span><br><span class="line">-v $pwd/ql/db:/ql/db \</span><br><span class="line">-v $pwd/ql/scripts:/ql/scripts \</span><br><span class="line">-v $pwd/ql/jbot:/ql/jbot \</span><br><span class="line">-v $pwd/ql/repo:/ql/repo \</span><br><span class="line">-p 5700:5700 \</span><br><span class="line">-e ENABLE_HANGUP=true \</span><br><span class="line">-e ENABLE_WEB_PANEL=true \</span><br><span class="line">--name qinglong \</span><br><span class="line">--hostname qinglong \</span><br><span class="line">--restart always \</span><br><span class="line">whyour/qinglong:latest</span><br></pre></td></tr></table></figure>

<blockquote>
<p>通过<a href="https://link.zhihu.com/?target=http://ip:5700">http://ip:5700</a>访问面板</p>
</blockquote>
<p>定时任务：</p>
<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">ql repo https://ghproxy.com/https://github.com/shufflewzc/faker2.git &quot;jd_|jx_|gua_|jddj_|getJDCookie&quot; &quot;activity|backUp&quot; &quot;^jd[^_]|USER|function|utils|sendnotify|ZooFaker_Necklace.js|JDJRValidator_Pure|sign_graphics_validate|ql&quot;</span><br><span class="line"></span><br></pre></td></tr></table></figure>





<p>账号列表：</p>
<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">cat /ql/config/auth.json</span><br></pre></td></tr></table></figure>


  </div>
</article>
