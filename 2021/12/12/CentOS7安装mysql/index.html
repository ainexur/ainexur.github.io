    <h2 id="1-安装"><a href="#1-安装" class="headerlink" title="1. 安装"></a>1. 安装</h2><p>由于mysql被oracle收购，后面可能面临闭源问题，所以用mariadb（mysql的另一个分支代替）</p>
<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">sudo yum remove mysql	#卸载残留</span><br><span class="line">yum -y install mariadb-server mariadb	#安装</span><br><span class="line">service mariadb start	#启动</span><br></pre></td></tr></table></figure>

<h2 id="2-设置开机启动"><a href="#2-设置开机启动" class="headerlink" title="2. 设置开机启动"></a>2. 设置开机启动</h2><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">sudo systemctl enable mariadb	#设置开机启动</span><br><span class="line">sudo systemctl is-enabled maradb	#查看是否开机启动</span><br></pre></td></tr></table></figure>


  </div>
